# pixterm's personal harness wiring — injected by /omakase-init, gitignored via
# .git/info/exclude (never committed). pixterm commits NO lefthook.yml, so this is
# the SOLE local hook config — nothing to merge over; every local git-hook gate
# lives here.
#
# Gates are grouped by TYPE, built to extend (add more of a type, don't special-case):
#   scoped checkers   — fast, staged-file-scoped, auto-fix; run per-commit.
#   complete checkers — whole-project; run per-push (turbo cache keeps repeats cheap).
#   discipline guards — workflow enforcement (worktree, ADR, visual-verify).
#
# Escape hatches: SKIP_WORKTREE_CHECK=1, SKIP_ADR_CHECK=1, OMAKASE_SKIP_VISUAL_VERIFY=1.

pre-commit:
  jobs:
    # --- scoped checkers ---
    - name: prettier
      glob: '*.{ts,tsx,vue,js,css,scss,json,md,yml,yaml}'
      run: prettier --write --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true

    - name: stylelint
      glob: '*.{css,scss,vue}'
      run: stylelint --fix --allow-empty-input {staged_files}
      stage_fixed: true

    # --- discipline guards ---
    - name: worktree-discipline
      run: bash .omakase/gates/worktree-discipline.sh

    - name: adr-required
      run: bash .omakase/gates/adr-required.sh
      env:
        HARNESS_ARCH_FILES: 'ARCHITECTURE.md AGENTS.md'

pre-push:
  parallel: true
  jobs:
    # --- complete checkers ---
    - name: typecheck
      run: pnpm exec turbo run typecheck

    - name: lint
      run: pnpm exec turbo run lint

    - name: test
      run: pnpm exec turbo run test

    - name: validate-packages
      run: pnpm run validate:packages

    - name: validate-exports
      run: pnpm run validate:exports

    - name: validate-markdown-links
      run: pnpm run validate:markdown-links

    - name: audit-ui-regression-tests
      run: pnpm run validate:audit-ui-regression-tests

    # --- discipline guards ---
    - name: deferred-check-visual-verify
      run: bash .omakase/gates/deferred-check.sh
      env:
        OMAKASE_CHECK: visual-verify
        OMAKASE_GLOB: 'apps/web/* packages/*-control/*'

# Worktree self-arm: copy any MISSING injected file into this worktree from the
# shared snapshot on every checkout. Never overwrites a local edit. Written by init.sh.
post-checkout:
  jobs:
    - name: omakase-self-arm
      run: bash "$(git rev-parse --git-common-dir)/omakase/ensure-present.sh"
